<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Spinglish OG card 1200x630</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #14110C;
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    position: relative;
  }
  .card { width: 1200px; height: 630px; display: flex; align-items: center; position: relative; overflow: hidden; }
  .glow {
    position: absolute; top: -160px; right: -60px;
    width: 720px; height: 620px;
    background: radial-gradient(closest-side, rgba(200,168,78,0.28), rgba(200,168,78,0) 70%);
    pointer-events: none;
  }
  .left { flex: 1; padding: 0 0 0 84px; position: relative; z-index: 2; }
  .eyebrow {
    font-size: 17px; letter-spacing: 5px; text-transform: uppercase;
    color: #C8A84E; font-weight: 700; margin-bottom: 26px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow::before { content: ''; width: 40px; height: 1px; background: #C8A84E; opacity: .6; }
  .wordmark {
    font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 700;
    font-size: 62px; color: #fff; letter-spacing: 1px; margin-bottom: 30px;
  }
  .headline {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; font-weight: 600;
    font-size: 46px; line-height: 1.5; color: #F3EEE2; letter-spacing: .01em;
  }
  .headline .accent { color: #C8A84E; }
  .sub { margin-top: 26px; font-size: 20px; color: #C9C2B3; line-height: 1.7; }
  .foot { margin-top: 40px; display: flex; align-items: center; gap: 14px; }
  .foot .pill {
    font-size: 15px; font-weight: 700; color: #241d10; background: #C8A84E;
    padding: 9px 20px; border-radius: 999px;
  }
  .foot .meta { font-size: 15px; color: #8f887a; }
  .right { width: 430px; height: 630px; position: relative; z-index: 1; }
  .phone {
    position: absolute; top: 74px; left: 30px;
    width: 300px; border-radius: 30px; padding: 6px; background: #0a0a0a;
    box-shadow: 0 40px 90px rgba(0,0,0,.5), 0 0 0 1px rgba(200,168,78,.12);
    transform: rotate(-3deg);
  }
  .phone img { width: 100%; border-radius: 25px; display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="left">
      <div class="eyebrow">Curated Language Mastery</div>
      <div class="wordmark">Spinglish</div>
      <div class="headline">英語は読めるのに、<br><span class="accent">口から出てこない</span>人へ。</div>
      <div class="sub">日本語を見て、英語で声に出すだけ。AIがその場で採点。</div>
      <div class="foot">
        <span class="pill">App Storeで無料ではじめる</span>
        <span class="meta">iPhone / 初回最大7日間 ¥0</span>
      </div>
    </div>
    <div class="right">
      <div class="phone"><img src="img/app/speak.png" alt=""></div>
    </div>
  </div>
</body>
</html>
