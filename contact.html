<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - Spinglish</title>
  <meta name="description" content="Spinglishへのお問い合わせフォーム。ご質問・ご要望をお聞かせください。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://spinglish.jp/contact.html">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --paper: #ffffff;
      --mist: #F4F2EC;
      --ink: #1C1813;
      --ink-2: #574F44;
      --ink-3: #6C6558;
      --gold: #7A6220;
      --gold-bright: #C8A84E;
      --line: #E7E2D6;
      --mincho: 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', serif;
      --sans: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --serif: Georgia, 'Times New Roman', serif;
    }
    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink-2);
      line-height: 1.9;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .topbar { border-bottom: 1px solid var(--line); padding: 16px 24px; }
    .topbar-inner { max-width: 560px; margin: 0 auto; }
    .wordmark { font-family: var(--serif); font-style: italic; font-weight: 700; font-size: 20px; color: var(--ink); letter-spacing: 0.5px; }
    .wordmark:hover { text-decoration: none; }
    .container { max-width: 560px; margin: 0 auto; padding: 52px 24px 96px; }
    h1 { font-family: var(--mincho); font-size: 30px; font-weight: 600; color: var(--ink); margin-bottom: 8px; letter-spacing: 0.01em; }
    .sub { color: var(--ink-3); font-size: 14px; margin-bottom: 34px; }
    label { display: block; font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 13px 15px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 20px;
      font-family: inherit;
    }
    input::placeholder, textarea::placeholder { color: #b3ac9d; }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(122,98,32,0.12);
    }
    textarea { height: 160px; resize: vertical; }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      color: #241d10;
      background: var(--gold-bright);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s;
      box-shadow: 0 12px 30px -10px rgba(200,168,78,0.5);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }
    .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
    .done { text-align: center; padding: 60px 0; }
    .done h2 { font-family: var(--mincho); font-size: 23px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
    .done p { color: var(--ink-3); font-size: 15px; }
    .back { display: inline-block; margin-top: 24px; font-size: 14px; }
    .error { color: #C2603E; font-size: 14px; margin-bottom: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><a href="index.html" class="wordmark">Spinglish</a></div></div>
  <div class="container">
    <div id="form-view">
      <h1>お問い合わせ</h1>
      <p class="sub">ご質問・ご要望をお聞かせください。</p>
      <div id="error-msg" class="error hidden"></div>
      <form id="contact-form" autocomplete="off">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required maxlength="100" placeholder="山田太郎">

        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required maxlength="200" placeholder="example@email.com">

        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" required maxlength="3000" placeholder="お気軽にどうぞ"></textarea>

        <div aria-hidden="true" style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">
          <label for="website">Website</label>
          <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
        </div>

        <button type="submit" class="btn" id="submit-btn">送信する</button>
      </form>
    </div>

    <div id="done-view" class="done hidden">
      <h2>送信しました</h2>
      <p>お問い合わせありがとうございます。<br>内容を確認のうえ、ご連絡いたします。</p>
      <a href="index.html" class="back">トップに戻る</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qklqzsotjioxpymwkdgi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrbHF6c290amlveHB5bXdrZGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODY3MDQsImV4cCI6MjA4OTU2MjcwNH0.oCl9vCTNTm8uAo4D9MRMzFzuxzW9zbW7QPjJzrRUQt8';

    const formLoadedAt = Date.now();
    const showDone = () => {
      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('done-view').classList.remove('hidden');
    };

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const honeypot = document.getElementById('website').value;
      const elapsed = Date.now() - formLoadedAt;

      if (honeypot || elapsed < 2000) {
        showDone();
        return;
      }

      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/contacts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ name, email, message })
        });

        if (!res.ok) throw new Error('送信に失敗しました');

        showDone();
      } catch (err) {
        errEl.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
