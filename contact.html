<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - Spinglish</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18096982916"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-18096982916');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0ede6;
      line-height: 1.8;
    }
    a { color: #c8a84e; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .sub {
      color: #999;
      font-size: 14px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      color: #f0ede6;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      margin-bottom: 20px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #c8a84e;
    }
    textarea {
      height: 160px;
      resize: vertical;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #0a0a0a;
      background: linear-gradient(135deg, #c8a84e, #e8c84e);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .done {
      text-align: center;
      padding: 60px 0;
    }
    .done h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }
    .done p {
      color: #999;
      font-size: 15px;
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      font-size: 14px;
    }
    .error {
      color: #e85454;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="form-view">
      <h1>お問い合わせ</h1>
      <p class="sub">ご質問・ご要望をお聞かせください。</p>
      <div id="error-msg" class="error hidden"></div>
      <form id="contact-form">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required placeholder="山田太郎">

        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">

        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" required placeholder="お気軽にどうぞ"></textarea>

        <button type="submit" class="btn" id="submit-btn">送信する</button>
      </form>
    </div>

    <div id="done-view" class="done hidden">
      <h2>送信しました</h2>
      <p>お問い合わせありがとうございます。<br>内容を確認のうえ、ご連絡いたします。</p>
      <a href="index.html" class="back">トップに戻る</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qklqzsotjioxpymwkdgi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrbHF6c290amlveHB5bXdrZGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODY3MDQsImV4cCI6MjA4OTU2MjcwNH0.oCl9vCTNTm8uAo4D9MRMzFzuxzW9zbW7QPjJzrRUQt8';

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/contacts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ name, email, message })
        });

        if (!res.ok) throw new Error('送信に失敗しました');

        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('done-view').classList.remove('hidden');
      } catch (err) {
        errEl.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
